<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <div class="omni-container">
      <button id="btn-pull" class="icon-btn" title="Pull URL from active tab">⚓</button>
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search by Title or URL...">
        <span id="clear-search" class="clear-btn" title="Clear Search">✕</span>
      </div>
      <div class="controls">
        <label style="font-size: 11px; display: flex; align-items: center; gap: 4px;">
          <input type="checkbox" id="exact-toggle"> Exact
        </label>
        <select id="star-filter" style="font-size: 11px; padding: 2px; border-radius: 4px; border: 1px solid #cbd5e1;">
          <option value="0">All ★</option>
          <option value="1">1+ ★</option>
          <option value="2">2+ ★</option>
          <option value="3">3+ ★</option>
          <option value="4">4+ ★</option>
          <option value="5">5 ★</option>
        </select>
        <button id="view-toggle" class="icon-btn" title="List/Grid Toggle">≣</button>
        <button id="settings-toggle" class="icon-btn" title="Settings">⚙️</button>
        <button id="btn-expand" class="icon-btn" title="Open Dashboard">↗️</button>
      </div>
    </div>
  </div>

  <div id="canvas"></div>

  <div id="tooltip"></div>

  <div class="footer">
    <button id="btn-invert">Invert Selection</button>
    <button id="btn-discard">Discard (Hibernate)</button>
    <button id="btn-close" class="danger">Close Tabs</button>
  </div>

  <!-- Settings Pane -->
  <div id="settings-pane">
    <div class="settings-header">
      Settings
      <button id="close-settings" class="icon-btn">X</button>
    </div>
    <div class="settings-content">
      <div class="setting-group">
        <label for="primary_click_action">Primary Click Action</label>
        <select id="primary_click_action">
          <option value="switch">Switch to Tab (Close Popup)</option>
          <option value="filter">Filter by URL (Manager Mode)</option>
        </select>
        <small style="font-size: 10px; color: #64748b;">Ctrl/Cmd+Click always selects.</small>
      </div>
      
      <div class="setting-group">
        <label style="display: flex; align-items: center; gap: 6px;">
          <input type="checkbox" id="ghost_filter_enabled"> Enable Ghost Filtering (Hover)
        </label>
      </div>

      <div class="setting-group">
        <label for="ghost_filter_scope">Ghost Filter Scope</label>
        <select id="ghost_filter_scope">
          <option value="url">Exact URL</option>
          <option value="domain">Domain Only (e.g. all youtube.com)</option>
          <option value="subdomain">Strip Subdomains (e.g. www/m treated same)</option>
        </select>
      </div>

      <div class="setting-group">
        <label style="display: flex; align-items: center; gap: 6px;">
          <input type="checkbox" id="startup_focus"> Auto-focus search bar on open
        </label>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
