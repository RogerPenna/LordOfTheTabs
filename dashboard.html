<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lord of the Tabs - Dashboard Pro</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="header">
    <div class="title-area">
      <h1>Tab Dashboard</h1>
      <span id="tab-count" class="badge">0 Tabs</span>
    </div>
    <div class="actions">
      <button id="btn-refresh" class="secondary">↻ Refresh Data</button>
      <button id="btn-backup" class="primary">Backup to Google Sheets</button>
    </div>
  </div>

  <div class="table-container">
    <table class="dashboard-table">
      <thead>
        <tr class="sort-row">
          <th style="width: 40px;">Icon</th>
          <th data-sort="title" class="sortable">Title <span class="sort-icon">↕</span></th>
          <th data-sort="url" class="sortable">URL <span class="sort-icon">↕</span></th>
          <th data-sort="age" class="sortable">Age <span class="sort-icon">↕</span></th>
          <th data-sort="lastAccess" class="sortable">Last Access <span class="sort-icon">↕</span></th>
          <th data-sort="importance" class="sortable">Importance <span class="sort-icon">↕</span></th>
        </tr>
        <tr class="filter-row">
          <th></th>
          <th><input type="text" placeholder="Filter title..." class="col-filter" data-col="title"></th>
          <th><input type="text" placeholder="Filter URL..." class="col-filter" data-col="url"></th>
          <th><input type="number" placeholder="Min age..." class="col-filter" data-col="age"></th>
          <th></th>
          <th>
            <select class="col-filter" data-col="importance">
              <option value="0">All Stars</option>
              <option value="1">1+ ★</option>
              <option value="2">2+ ★</option>
              <option value="3">3+ ★</option>
              <option value="4">4+ ★</option>
              <option value="5">5 ★</option>
            </select>
          </th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Data populated by JS -->
      </tbody>
    </table>
  </div>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
